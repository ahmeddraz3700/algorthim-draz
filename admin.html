<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>لوحة تحكم الخوارزميات</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#F5EFE1; --surface:#FFFDF8; --surface-2:#EFE6CF;
    --ink:#171F2B; --muted:#5C6270; --line:#DED2B0;
    --brass:#A97B2E; --brass-strong:#8C6423; --brass-tint:#EFDBAA;
    --teal:#2A6E63; --teal-tint:#D9EAE5;
    --danger:#B3432F; --danger-tint:#F5E1DC;
    --font-display:'Amiri', serif;
    --font-body:'IBM Plex Sans Arabic','Segoe UI',sans-serif;
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#0B1220; --surface:#121B2C; --surface-2:#182338;
      --ink:#EFE7D6; --muted:#9AA6BA; --line:#233150;
      --brass:#D9AE63; --brass-strong:#EFC77D; --brass-tint:#2B2312;
      --teal:#6BC1B1; --teal-tint:#0F2622;
      --danger:#E38271; --danger-tint:#33201C;
    }
  }
  :root[data-theme="dark"]{
    --bg:#0B1220; --surface:#121B2C; --surface-2:#182338;
    --ink:#EFE7D6; --muted:#9AA6BA; --line:#233150;
    --brass:#D9AE63; --brass-strong:#EFC77D; --brass-tint:#2B2312;
    --teal:#6BC1B1; --teal-tint:#0F2622;
    --danger:#E38271; --danger-tint:#33201C;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font-body); line-height:1.7;
  }
  h1,h2{ font-family:var(--font-display); font-weight:700; margin:0; }
  label{ display:block; font-size:.85rem; font-weight:600; color:var(--muted); margin-bottom:.4rem; }
  input, textarea{
    width:100%; font-family:inherit; font-size:.95rem; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:8px;
    padding:.7rem .9rem;
  }
  textarea{ resize:vertical; min-height:4.5rem; }
  input:focus, textarea:focus{ outline:2px solid var(--teal); outline-offset:1px; }
  button{ font-family:inherit; cursor:pointer; }

  /* ---- login screen ---- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;
  }
  .login-box{
    width:100%; max-width:360px; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:2.2rem; box-shadow:0 20px 45px -20px rgba(0,0,0,.25);
  }
  .login-box .mark{
    width:44px; height:44px; margin:0 auto 1rem;
    background:linear-gradient(155deg, var(--brass-strong), var(--brass));
    clip-path:polygon(50% 0%,57.6% 31.5%,85.3% 14.6%,68.4% 42.3%,100% 50%,68.4% 57.6%,85.3% 85.3%,57.6% 68.4%,50% 100%,42.3% 68.4%,14.6% 85.3%,31.5% 57.6%,0% 50%,31.5% 42.3%,14.6% 14.6%,42.3% 31.5%);
  }
  .login-box h1{ text-align:center; font-size:1.4rem; margin-bottom:.3rem; }
  .login-box p.sub{ text-align:center; color:var(--muted); font-size:.85rem; margin-bottom:1.6rem; }
  .login-box .field{ margin-bottom:1rem; }
  .login-box button{
    width:100%; padding:.8rem; border:none; border-radius:8px;
    background:var(--brass); color:#221802; font-weight:600; font-size:.95rem;
    margin-top:.4rem;
  }
  .msg{ font-size:.85rem; border-radius:8px; padding:.6rem .8rem; margin-top:1rem; display:none; }
  .msg.show{ display:block; }
  .msg.error{ background:var(--danger-tint); color:var(--danger); }
  .msg.ok{ background:var(--teal-tint); color:var(--teal); }
  .msg.info{ background:var(--surface-2); color:var(--muted); }

  /* ---- dashboard ---- */
  #dashboard{ display:none; }
  header.top{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:1rem 1.5rem; background:var(--surface); border-bottom:1px solid var(--line);
  }
  header.top h1{ font-size:1.15rem; }
  .top-actions{ display:flex; gap:.6rem; align-items:center; }
  .btn{
    padding:.55rem 1rem; border-radius:8px; border:1px solid var(--line);
    background:var(--surface-2); color:var(--ink); font-size:.85rem; font-weight:600;
    text-decoration:none; display:inline-flex; align-items:center; gap:.4rem;
  }
  .btn.primary{ background:var(--brass); color:#221802; border-color:transparent; }
  .btn.danger{ background:transparent; color:var(--danger); border-color:var(--line); }

  main.wrap{ max-width:820px; margin:0 auto; padding:2rem 1.5rem 5rem; }
  .section-card{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:1.6rem; margin-bottom:1.5rem;
  }
  .section-card h2{ font-size:1.05rem; margin-bottom:1.2rem; color:var(--brass-strong); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  @media (max-width:640px){ .grid2{ grid-template-columns:1fr; } }
  .field{ margin-bottom:1rem; }
  .field:last-child{ margin-bottom:0; }

  .img-row{ display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
  .img-preview{
    width:140px; height:93px; object-fit:cover; border-radius:8px; border:1px solid var(--line);
    background:var(--surface-2);
  }
  .file-btn{
    padding:.55rem 1rem; border-radius:8px; border:1px solid var(--line);
    background:var(--surface-2); font-size:.85rem; cursor:pointer;
  }

  .save-bar{
    position:sticky; bottom:0; background:var(--surface); border-top:1px solid var(--line);
    padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; justify-content:flex-end;
  }
  .save-bar .status{ font-size:.85rem; color:var(--muted); margin-inline-end:auto; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="mark" aria-hidden="true"></div>
    <h1>لوحة تحكم الخوارزميات</h1>
    <p class="sub">دخول المطور فقط</p>
    <div class="field">
      <label for="email">البريد الإلكتروني</label>
      <input id="email" type="email" autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">كلمة المرور</label>
      <input id="password" type="password" autocomplete="current-password" />
    </div>
    <button id="loginBtn" type="button">دخول</button>
    <div id="loginMsg" class="msg error"></div>
    <div id="setupMsg" class="msg info"></div>
  </div>
</div>

<div id="dashboard">
  <header class="top">
    <h1>لوحة تحكم الخوارزميات</h1>
    <div class="top-actions">
      <a class="btn" href="index.html" target="_blank">عرض الموقع</a>
      <button class="btn danger" id="logoutBtn" type="button">تسجيل الخروج</button>
    </div>
  </header>

  <main class="wrap">

    <div class="section-card">
      <h2>الصورة الرئيسية</h2>
      <div class="img-row">
        <img id="heroImgPreview" class="img-preview" alt="معاينة الصورة" />
        <label class="file-btn">
          اختيار صورة جديدة
          <input id="heroImgInput" type="file" accept="image/*" style="display:none" />
        </label>
        <span id="imgStatus" style="font-size:.8rem;color:var(--muted);"></span>
      </div>
      <p style="font-size:.78rem;color:var(--muted);margin-top:.7rem;">الصورة بتتصغّر تلقائيًا قبل الحفظ، فمفيش داعي لأي تجهيز مسبق.</p>
    </div>

    <div class="section-card">
      <h2>الرئيسية (Hero)</h2>
      <div class="field"><label>العبارة الصغيرة فوق العنوان</label><input data-field="heroEyebrow" /></div>
      <div class="field"><label>العنوان الرئيسي</label><textarea data-field="heroTitle"></textarea></div>
      <div class="field"><label>الفقرة تحت العنوان</label><textarea data-field="heroLede"></textarea></div>
    </div>

    <div class="section-card">
      <h2>عن المستر</h2>
      <div class="field"><label>الوظيفة (تحت الاسم)</label><input data-field="aboutRole" /></div>
      <div class="field"><label>العبارة الصغيرة</label><input data-field="aboutEyebrow" /></div>
      <div class="field"><label>العنوان</label><textarea data-field="aboutTitle"></textarea></div>
      <div class="field"><label>نبذة عني</label><textarea data-field="aboutBody" style="min-height:7rem;"></textarea></div>
    </div>

    <div class="section-card">
      <h2>هتلاقي في الموقع إيه؟</h2>
      <div class="field"><label>عنوان القسم</label><input data-field="contentTitle" /></div>
      <div class="grid2">
        <div class="field"><label>عنوان 1</label><input data-field="pillar1Title" /></div>
        <div class="field"><label>وصف 1</label><textarea data-field="pillar1Body"></textarea></div>
        <div class="field"><label>عنوان 2</label><input data-field="pillar2Title" /></div>
        <div class="field"><label>وصف 2</label><textarea data-field="pillar2Body"></textarea></div>
        <div class="field"><label>عنوان 3</label><input data-field="pillar3Title" /></div>
        <div class="field"><label>وصف 3</label><textarea data-field="pillar3Body"></textarea></div>
        <div class="field"><label>عنوان 4</label><input data-field="pillar4Title" /></div>
        <div class="field"><label>وصف 4</label><textarea data-field="pillar4Body"></textarea></div>
      </div>
    </div>

    <div class="section-card">
      <h2>الرياضيات مش حبيسة الكرّاسة</h2>
      <div class="field"><label>عنوان القسم</label><input data-field="everywhereTitle" /></div>
      <div class="grid2">
        <div class="field"><label>عنوان 1</label><input data-field="ew1Title" /></div>
        <div class="field"><label>وصف 1</label><textarea data-field="ew1Body"></textarea></div>
        <div class="field"><label>عنوان 2</label><input data-field="ew2Title" /></div>
        <div class="field"><label>وصف 2</label><textarea data-field="ew2Body"></textarea></div>
        <div class="field"><label>عنوان 3</label><input data-field="ew3Title" /></div>
        <div class="field"><label>وصف 3</label><textarea data-field="ew3Body"></textarea></div>
      </div>
    </div>

    <div class="section-card">
      <h2>أحدث المحتوى</h2>
      <div class="field"><label>عنوان القسم</label><input data-field="latestTitle" /></div>
      <div class="field"><label>الملاحظة تحت العنوان</label><textarea data-field="latestNote"></textarea></div>
      <div class="field"><label>وصف كارت الفيديو</label><textarea data-field="latestVideoDesc"></textarea></div>
      <div class="field"><label>وصف كارت المذكرة</label><textarea data-field="latestPdfDesc"></textarea></div>
      <div class="field"><label>وصف كارت المقال</label><textarea data-field="latestArticleDesc"></textarea></div>
    </div>

    <div class="section-card">
      <h2>تواصل</h2>
      <div class="field"><label>العنوان</label><input data-field="contactTitle" /></div>
      <div class="field"><label>الفقرة</label><textarea data-field="contactBody"></textarea></div>
    </div>

  </main>

  <div class="save-bar">
    <span class="status" id="saveStatus"></span>
    <button class="btn primary" id="saveBtn" type="button">حفظ التغييرات</button>
  </div>
</div>

<script type="module">
  // نفس بيانات Firebase اللي في index.html — لازم تكون متطابقة.
  var firebaseConfig = {
    apiKey: "AIzaSyCrbVT7Su6avgD0QeFIGXaNm1lG1RROtIA",
    authDomain: "al-gorthim-draz.firebaseapp.com",
    projectId: "al-gorthim-draz",
    storageBucket: "al-gorthim-draz.firebasestorage.app",
    messagingSenderId: "437759985918",
    appId: "1:437759985918:web:7eebe8de3da9edd44dbdaf"
  };

  var defaults = {
    heroEyebrow: "منصّة لرَبط الرياضيات بالواقع",
    heroTitle: "الرياضيات هي الخوارزمية اللي بتشغّل حياتك",
    heroLede: "مع المهندس أحمد دراز، هتشوف الرياضيات من زاوية تانية: مش مادة بتُحفظ، دي أداة بتفهم بيها العالم حواليك. فيديوهات ومذكرات وأوراق عمل لكل مراحل الإعدادي والثانوي.",
    heroImage: "assets/hero-scholars.jpg",
    aboutRole: "مهندس كهرباء — مدرس رياضيات",
    aboutEyebrow: "مين المهندس أحمد دراز؟",
    aboutTitle: "مهندس بيشرح المسائل زي ما بيشرح الدوائر الكهربائية",
    aboutBody: "شغلي إني أبسّط المعادلات والمسائل وأربطها بأمثلة من حياتنا اليومية — الهدف مش إنك تحفظ خطوات الحل، الهدف إنك تفهم ليه بنحلها كده، وتقدر تستخدم نفس الطريقة في أي مسألة تانية تقابلك.",
    contentTitle: "هتلاقي في الموقع إيه؟",
    pillar1Title: "فيديوهات تعليمية",
    pillar1Body: "شرح مبسّط لكل درس، بخطوات واضحة وأمثلة واقعية بدل الحفظ الجامد.",
    pillar2Title: "مذكرات وأوراق عمل",
    pillar2Body: "ملازم ومراجعات لكل الصفوف، جاهزة للطباعة والتحميل من الموقع مباشرة.",
    pillar3Title: "الرياضيات في الحياة",
    pillar3Body: "إزاي المعادلة اللي بتذاكرها بتفسّر حاجات بتشوفها كل يوم حواليك.",
    pillar4Title: "نصايح وأدوات مذاكرة",
    pillar4Body: "طرق مذاكرة ومراجعة صح توفّرلك وقت ومجهود قبل الامتحان.",
    everywhereTitle: "الرياضيات مش حبيسة الكرّاسة",
    ew1Title: "الهندسة الكهربائية",
    ew1Body: "مقاومة، وتيار، وجهد — كل جهاز بتستخدمه شغّال بمعادلات رياضية بسيطة.",
    ew2Title: "الاقتصاد والفلوس",
    ew2Body: "فايدة، ونسبة خصم، وقرار شراء — كلها قرارات بتاخدها بالحساب من غير ما تحس.",
    ew3Title: "الطبيعة والأنماط",
    ew3Body: "تماثل، وتكرار، وأشكال هندسية موجودة في كل حاجة حواليك — من ورقة الشجر للخلية النحل.",
    latestTitle: "المحتوى في الطريق",
    latestNote: "أول دفعة فيديوهات ومذكرات هتتنزل هنا قريبًا. تابعنا عشان توصلك أول ما تطلع.",
    latestVideoDesc: "أول فيديو هيربط بين درس من المنهج ومثال من حياتنا اليومية.",
    latestPdfDesc: "مذكرة مراجعة أول باب، جاهزة للتحميل والطباعة.",
    latestArticleDesc: "مقال قصير عن استخدام عملي للرياضيات في مجال الهندسة.",
    contactTitle: "تابعنا عشان يوصلك كل جديد",
    contactBody: "قنوات المتابعة والتواصل هتتحدّث هنا أول ما تكون جاهزة."
  };

  var loginScreen = document.getElementById('loginScreen');
  var dashboard = document.getElementById('dashboard');
  var loginMsg = document.getElementById('loginMsg');
  var setupMsg = document.getElementById('setupMsg');
  var saveStatus = document.getElementById('saveStatus');
  var imgStatus = document.getElementById('imgStatus');

  function showMsg(el, text){ el.textContent = text; el.classList.add('show'); }

  if(firebaseConfig.apiKey === "PASTE_API_KEY_HERE"){
    showMsg(setupMsg, "الإعداد لسه مايتماش: لازم تضاف بيانات Firebase في هذا الملف وفي index.html قبل ما تقدر تسجّل دخول.");
    document.getElementById('loginBtn').disabled = true;
  } else {
    runApp();
  }

  async function runApp(){
    var appMod = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js");
    var authMod = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js");
    var fsMod = await import("https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js");

    var app = appMod.initializeApp(firebaseConfig);
    var auth = authMod.getAuth(app);
    var db = fsMod.getFirestore(app);

    var pendingImageUrl = null;

    // بيصغّر الصورة ويحوّلها لنص (data URL) عشان تتخزن جوه Firestore من غير أي استضافة صور منفصلة
    function fileToResizedDataURL(file, maxWidth){
      return new Promise(function(resolve, reject){
        var reader = new FileReader();
        reader.onerror = function(){ reject(new Error('read failed')); };
        reader.onload = function(e){
          var img = new Image();
          img.onerror = function(){ reject(new Error('decode failed')); };
          img.onload = function(){
            var scale = Math.min(1, maxWidth / img.width);
            var w = Math.round(img.width * scale);
            var h = Math.round(img.height * scale);
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.75));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    document.getElementById('loginBtn').addEventListener('click', async function(){
      loginMsg.classList.remove('show');
      var email = document.getElementById('email').value.trim();
      var pass = document.getElementById('password').value;
      try{
        await authMod.signInWithEmailAndPassword(auth, email, pass);
      }catch(err){
        showMsg(loginMsg, "بيانات الدخول غير صحيحة.");
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', function(){
      authMod.signOut(auth);
    });

    authMod.onAuthStateChanged(auth, async function(user){
      if(user){
        loginScreen.style.display = 'none';
        dashboard.style.display = 'block';
        await loadContent();
      } else {
        loginScreen.style.display = 'flex';
        dashboard.style.display = 'none';
      }
    });

    async function loadContent(){
      var data = {};
      try{
        var snap = await fsMod.getDoc(fsMod.doc(db, "site", "content"));
        if(snap.exists()) data = snap.data();
      }catch(err){ /* fall back to defaults below */ }

      document.querySelectorAll('[data-field]').forEach(function(el){
        var key = el.getAttribute('data-field');
        el.value = (data[key] !== undefined ? data[key] : defaults[key]) || '';
      });

      var heroImageUrl = data.heroImage || defaults.heroImage;
      document.getElementById('heroImgPreview').src = heroImageUrl;
      pendingImageUrl = heroImageUrl;
    }

    document.getElementById('heroImgInput').addEventListener('change', async function(e){
      var file = e.target.files[0];
      if(!file) return;
      imgStatus.textContent = "جاري تجهيز الصورة...";
      try{
        var dataUrl = await fileToResizedDataURL(file, 1100);
        if(dataUrl.length > 900000){
          imgStatus.textContent = "الصورة لسه كبيرة، جرب صورة تانية.";
          return;
        }
        pendingImageUrl = dataUrl;
        document.getElementById('heroImgPreview').src = dataUrl;
        imgStatus.textContent = "تم تجهيز الصورة. متنساش تدوس (حفظ التغييرات).";
      }catch(err){
        imgStatus.textContent = "حصل خطأ في تجهيز الصورة.";
      }
    });

    document.getElementById('saveBtn').addEventListener('click', async function(){
      saveStatus.textContent = "جاري الحفظ...";
      var payload = {};
      document.querySelectorAll('[data-field]').forEach(function(el){
        payload[el.getAttribute('data-field')] = el.value;
      });
      payload.heroImage = pendingImageUrl;
      try{
        await fsMod.setDoc(fsMod.doc(db, "site", "content"), payload, { merge: true });
        saveStatus.textContent = "تم الحفظ — التغييرات ظاهرة على الموقع دلوقتي.";
      }catch(err){
        saveStatus.textContent = "حصل خطأ أثناء الحفظ. حاول تاني.";
      }
    });
  }
</script>
</body>
</html>
